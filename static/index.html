<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxNPC — NPC Inteligente por Voz com IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a3e 0%, #0d0d2b 100%);
            border-bottom: 2px solid #2a2a5a;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .subtitle { font-size: 0.8rem; color: #888; }

        /* Persona selector */
        .persona-bar {
            background: #111130;
            padding: 0.8rem 2rem;
            display: flex;
            gap: 0.8rem;
            overflow-x: auto;
            border-bottom: 1px solid #222;
        }
        .persona-btn {
            background: #1a1a40;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 0.6rem 1.2rem;
            color: #ccc;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            font-size: 0.9rem;
        }
        .persona-btn:hover { border-color: #7b2ff7; color: #fff; }
        .persona-btn.active {
            border-color: #00d4ff;
            background: #1a1a50;
            color: #00d4ff;
        }

        /* Stats bar */
        .stats-bar {
            background: #0d0d25;
            padding: 0.5rem 2rem;
            display: flex;
            gap: 2rem;
            font-size: 0.85rem;
            color: #888;
            border-bottom: 1px solid #1a1a3a;
        }
        .stat { display: flex; align-items: center; gap: 0.3rem; }
        .stat-value { color: #00d4ff; font-weight: bold; }

        /* Chat area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        .message {
            display: flex;
            gap: 0.8rem;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { flex-direction: row-reverse; }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }
        .message.npc .avatar { background: #1a1a50; border: 2px solid #7b2ff7; }
        .message.user .avatar { background: #0a3a2a; border: 2px solid #00d4ff; }

        .bubble {
            max-width: 70%;
            padding: 0.8rem 1.2rem;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        .message.npc .bubble {
            background: #1a1a40;
            border: 1px solid #2a2a5a;
            border-bottom-left-radius: 4px;
        }
        .message.user .bubble {
            background: #0a3a3a;
            border: 1px solid #0a4a4a;
            border-bottom-right-radius: 4px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 0.5rem;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #7b2ff7;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input area */
        .input-area {
            background: #111130;
            border-top: 2px solid #2a2a5a;
            padding: 1rem 2rem;
        }
        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 0.8rem;
        }
        .input-wrapper input {
            flex: 1;
            background: #0a0a25;
            border: 2px solid #2a2a5a;
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-wrapper input:focus { border-color: #7b2ff7; }
        .input-wrapper input::placeholder { color: #555; }

        .send-btn {
            background: linear-gradient(135deg, #7b2ff7, #00d4ff);
            border: none;
            border-radius: 12px;
            padding: 0.8rem 1.5rem;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.3s;
            font-weight: bold;
        }
        .send-btn:hover { opacity: 0.85; }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Welcome screen */
        .welcome {
            text-align: center;
            margin: auto;
            padding: 2rem;
        }
        .welcome h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .welcome p { color: #888; margin-bottom: 1.5rem; }
        .welcome .greeting {
            background: #1a1a40;
            border: 1px solid #2a2a5a;
            border-radius: 16px;
            padding: 1.5rem;
            font-style: italic;
            color: #ccc;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header { padding: 0.8rem 1rem; }
            .persona-bar { padding: 0.6rem 1rem; }
            .chat-container { padding: 1rem; }
            .input-area { padding: 0.8rem 1rem; }
            .bubble { max-width: 85%; }
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>⚔️ VoxNPC</h1>
        <div class="subtitle">NPC Inteligente por Voz com IA — Whisper · ChatGPT · Python</div>
    </div>
</div>

<div class="persona-bar" id="personaBar">
    <!-- Personas carregadas via JS -->
</div>

<div class="stats-bar">
    <div class="stat">⭐ XP: <span class="stat-value" id="statXp">0</span></div>
    <div class="stat">📊 Nível: <span class="stat-value" id="statLevel">1 — Aprendiz</span></div>
    <div class="stat">💬 Interações: <span class="stat-value" id="statInteractions">0</span></div>
</div>

<div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcome">
        <h2 id="welcomeTitle">🧙 Eldrin, o Sábio</h2>
        <p>Escolha uma persona acima e comece a conversar</p>
        <div class="greeting" id="welcomeGreeting">Carregando...</div>
    </div>
</div>

<div class="input-area">
    <div class="input-wrapper">
        <input type="text" id="messageInput" placeholder="Digite sua mensagem..." autocomplete="off" />
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Enviar</button>
    </div>
</div>

<script>
    const API = window.location.origin;
    let currentPersona = 'sage';
    let sessionId = 'session_' + Math.random().toString(36).substring(2, 10);
    let personas = [];

    // Carrega personas
    async function loadPersonas() {
        try {
            const res = await fetch(`${API}/api/personas`);
            personas = await res.json();
            renderPersonaBar();
            selectPersona(currentPersona);
        } catch (e) {
            console.error('Erro ao carregar personas:', e);
        }
    }

    function renderPersonaBar() {
        const bar = document.getElementById('personaBar');
        bar.innerHTML = personas.map(p =>
            `<button class="persona-btn ${p.id === currentPersona ? 'active' : ''}"
                     onclick="selectPersona('${p.id}')"
                     title="${p.title}">
                ${p.emoji} ${p.name}
            </button>`
        ).join('');
    }

    function selectPersona(id) {
        currentPersona = id;
        const persona = personas.find(p => p.id === id);
        if (!persona) return;

        // Reset session
        sessionId = 'session_' + Math.random().toString(36).substring(2, 10);

        // Update UI
        renderPersonaBar();
        document.getElementById('chatContainer').innerHTML = `
            <div class="welcome" id="welcome">
                <h2>${persona.emoji} ${persona.name}</h2>
                <p>${persona.title}</p>
                <div class="greeting">${persona.greeting}</div>
            </div>
        `;
        updateStats({ xp: 0, level: 1, level_name: 'Aprendiz', interactions: 0 });
    }

    function addMessage(text, type, emoji) {
        // Remove welcome screen
        const welcome = document.getElementById('welcome');
        if (welcome) welcome.remove();

        const container = document.getElementById('chatContainer');
        const avatarContent = type === 'user' ? '🧑' : (emoji || '🤖');

        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.innerHTML = `
            <div class="avatar">${avatarContent}</div>
            <div class="bubble">${text}</div>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function showTyping() {
        const container = document.getElementById('chatContainer');
        const div = document.createElement('div');
        div.className = 'message npc';
        div.id = 'typing';
        const persona = personas.find(p => p.id === currentPersona);
        div.innerHTML = `
            <div class="avatar">${persona?.emoji || '🤖'}</div>
            <div class="bubble">
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            </div>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function removeTyping() {
        const el = document.getElementById('typing');
        if (el) el.remove();
    }

    function updateStats(stats) {
        document.getElementById('statXp').textContent = stats.xp;
        document.getElementById('statLevel').textContent = `${stats.level} — ${stats.level_name}`;
        document.getElementById('statInteractions').textContent = stats.interactions;
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const btn = document.getElementById('sendBtn');
        const text = input.value.trim();
        if (!text) return;

        // Show user message
        addMessage(text, 'user');
        input.value = '';
        btn.disabled = true;
        showTyping();

        try {
            const res = await fetch(`${API}/api/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: text,
                    persona_id: currentPersona,
                    session_id: sessionId,
                }),
            });
            const data = await res.json();
            removeTyping();
            addMessage(data.response, 'npc', data.persona_emoji);
            updateStats(data.stats);
        } catch (e) {
            removeTyping();
            addMessage('Erro ao conectar com o servidor. Tente novamente.', 'npc', '❌');
        }

        btn.disabled = false;
        input.focus();
    }

    // Enter para enviar
    document.getElementById('messageInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // Inicia
    loadPersonas();
</script>

</body>
</html>
